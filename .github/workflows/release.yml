name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Install Zig
        uses: mlugg/setup-zig@v1
        with:
          version: 0.14.0

      - name: Build
        shell: cmd
        run: |
          zig rc tq2clone.rc
          zig cc tq2clone.c tq2clone.res -o tq2clone.exe -O2 -lkernel32 -luser32 -lgdi32 -lcomctl32 -lshell32 "-Wl,--subsystem,windows"

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: tq2clone.exe
